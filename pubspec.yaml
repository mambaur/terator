name: terator
description: Template Surat Generator.

publish_to: 'none'
version: 1.4.0+10

environment:
  sdk: '>=2.18.2 <3.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_native_html_to_pdf: ^3.0.0
  flutter_file_saver: ^0.9.0
  path_provider: ^2.1.5
  html_editor_enhanced: ^2.7.1
  package_info_plus: ^9.0.1
  fluttertoast: ^9.0.0
  flutter_pdfview: ^1.4.4
  loading_animation_widget: ^1.2.0+3
  overlay_loading_progress: ^1.0.0
  cached_network_image: ^3.4.1
  google_fonts: ^8.0.2
  intl: ^0.20.2
  sqflite: ^2.2.1
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  url_launcher: ^6.1.7
  flutter_signature_view: ^2.0.0
  share_plus: ^12.0.2
  google_mobile_ads: ^7.0.0
  flutter_typeahead: ^5.0.1
  upgrader: ^12.5.0
  purchases_flutter: ^9.16.0
  purchases_ui_flutter: ^9.16.0
  
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/img/empty.png
    - assets/img/file-empty.png
    - assets/img/account-empty.png
    - assets/img/banner.jpg
    - assets/img/terator_logo.png
    - assets/img/terator-logo-white.png
    - assets/img/ic_launcher.png
    - assets/icons/business.png
    - assets/icons/common.png
    - assets/icons/faq.png
    - assets/icons/school.png
    - assets/icons/village.png
    - assets/icons/work.png
    - assets/icons/kesehatan.png
    - assets/icons/pribadi.png
    - assets/icons/keuangan.png
  
